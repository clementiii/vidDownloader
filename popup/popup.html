<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="11" stroke="currentColor" stroke-width="2"/>
          <path d="M9.5 8.5V15.5L16 12L9.5 8.5Z" fill="currentColor"/>
        </svg>
        <span class="title">Video Downloader</span>
      </div>
      <div class="actions">
        <button id="scanBtn" class="icon-btn" title="Rescan page">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 11-3-6.7"/>
            <path d="M21 4v4h-4"/>
          </svg>
        </button>
        <button id="clearBtn" class="icon-btn" title="Clear all">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"/>
          </svg>
        </button>
      </div>
    </header>
    
    <div id="companionStatus" class="companion-status">
      <span class="status-dot"></span>
      <span class="status-text">Checking companion app...</span>
    </div>
    
    <main class="content">
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Scanning for videos...</p>
      </div>
      
      <div id="noVideos" class="no-videos hidden">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M10 9l5 3-5 3V9z"/>
        </svg>
        <p>No videos detected</p>
        <span class="hint">Try playing a video or click rescan</span>
      </div>
      
      <ul id="videoList" class="video-list hidden"></ul>
    </main>
    
    <footer class="footer">
      <span id="videoCount">0 videos found</span>
    </footer>
  </div>
  
  <!-- Quality Selector Modal -->
  <div id="qualityModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title-section">
          <h3>Select Quality</h3>
          <p id="modalVideoTitle" class="modal-subtitle"></p>
        </div>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <div id="qualityLoading" class="quality-loading">
          <div class="spinner small"></div>
          <span>Fetching available qualities...</span>
        </div>
        <div id="qualityOptions" class="quality-options hidden"></div>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
